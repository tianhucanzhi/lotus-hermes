<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="lotus-bg" x1="8" x2="112" y1="8" y2="112">
      <stop offset="0%" stop-color="#101828" />
      <stop offset="45%" stop-color="#0b1220" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    <linearGradient id="lotus-border" x1="0" x2="120" y1="0" y2="120">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.85" />
      <stop offset="50%" stop-color="#6366f1" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.75" />
    </linearGradient>
    <linearGradient id="lotus-petal-outer" x1="18" x2="102" y1="18" y2="102">
      <stop offset="0%" stop-color="#67e8f9" />
      <stop offset="35%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="lotus-petal-inner" x1="28" x2="92" y1="30" y2="90">
      <stop offset="0%" stop-color="#bae6fd" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <radialGradient id="lotus-core" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#ecfeff" />
      <stop offset="45%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </radialGradient>
    <radialGradient id="lotus-vignette" cx="50%" cy="38%" r="72%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect fill="url(#lotus-bg)" height="120" rx="26" width="120" />
  <rect fill="url(#lotus-vignette)" height="120" rx="26" width="120" />

  <!-- Tech grid -->
  <g opacity="0.14" stroke="#38bdf8" stroke-width="0.5">
    <path d="M0 30 H120 M0 60 H120 M0 90 H120 M30 0 V120 M60 0 V120 M90 0 V120" />
  </g>

  <!-- AI orbit ring -->
  <circle cx="60" cy="61" opacity="0.42" r="44" stroke="#22d3ee" stroke-dasharray="4 6" stroke-width="0.9" />
  <circle cx="60" cy="18" fill="#22d3ee" opacity="0.95" r="2.2" />
  <circle cx="98" cy="43" fill="#60a5fa" opacity="0.9" r="1.8" />
  <circle cx="94" cy="86" fill="#818cf8" opacity="0.85" r="1.8" />
  <circle cx="26" cy="86" fill="#38bdf8" opacity="0.85" r="1.8" />
  <circle cx="22" cy="43" fill="#22d3ee" opacity="0.9" r="1.8" />

  <!-- Outer bloom -->
  <g opacity="0.96">
    <ellipse cx="60" cy="79" fill="url(#lotus-petal-outer)" rx="12" ry="26" transform="rotate(0 60 61)" />
    <ellipse cx="60" cy="79" fill="url(#lotus-petal-outer)" rx="12" ry="26" transform="rotate(45 60 61)" />
    <ellipse cx="60" cy="79" fill="url(#lotus-petal-outer)" rx="12" ry="26" transform="rotate(90 60 61)" />
    <ellipse cx="60" cy="79" fill="url(#lotus-petal-outer)" rx="12" ry="26" transform="rotate(135 60 61)" />
    <ellipse cx="60" cy="79" fill="url(#lotus-petal-outer)" rx="12" ry="26" transform="rotate(180 60 61)" />
    <ellipse cx="60" cy="79" fill="url(#lotus-petal-outer)" rx="12" ry="26" transform="rotate(225 60 61)" />
    <ellipse cx="60" cy="79" fill="url(#lotus-petal-outer)" rx="12" ry="26" transform="rotate(270 60 61)" />
    <ellipse cx="60" cy="79" fill="url(#lotus-petal-outer)" rx="12" ry="26" transform="rotate(315 60 61)" />
  </g>

  <!-- Inner bloom -->
  <g opacity="1">
    <ellipse cx="60" cy="73" fill="url(#lotus-petal-inner)" rx="8" ry="17" transform="rotate(22.5 60 61)" />
    <ellipse cx="60" cy="73" fill="url(#lotus-petal-inner)" rx="8" ry="17" transform="rotate(67.5 60 61)" />
    <ellipse cx="60" cy="73" fill="url(#lotus-petal-inner)" rx="8" ry="17" transform="rotate(112.5 60 61)" />
    <ellipse cx="60" cy="73" fill="url(#lotus-petal-inner)" rx="8" ry="17" transform="rotate(157.5 60 61)" />
    <ellipse cx="60" cy="73" fill="url(#lotus-petal-inner)" rx="8" ry="17" transform="rotate(202.5 60 61)" />
    <ellipse cx="60" cy="73" fill="url(#lotus-petal-inner)" rx="8" ry="17" transform="rotate(247.5 60 61)" />
    <ellipse cx="60" cy="73" fill="url(#lotus-petal-inner)" rx="8" ry="17" transform="rotate(292.5 60 61)" />
    <ellipse cx="60" cy="73" fill="url(#lotus-petal-inner)" rx="8" ry="17" transform="rotate(337.5 60 61)" />
  </g>

  <!-- Neural core (crisp — no blur filter for small icon sizes) -->
  <circle cx="60" cy="59" fill="url(#lotus-core)" r="12" />
  <circle cx="60" cy="59" fill="#f0fdff" opacity="0.62" r="5.5" />
  <path
    d="M60 52.5 L60 65.5 M53.5 59 L66.5 59 M55.5 54.5 L64.5 63.5 M64.5 54.5 L55.5 63.5"
    stroke="#0c4a6e"
    stroke-linecap="round"
    stroke-width="1.35"
  />
  <circle cx="60" cy="59" fill="#0ea5e9" r="2.4" />

  <!-- Bud accent -->
  <path d="M60 33 C53.5 39.5 53.5 48.5 60 53 C66.5 48.5 66.5 39.5 60 33Z" fill="#7dd3fc" opacity="0.92" />

  <!-- Frame highlight -->
  <rect
    height="117"
    opacity="0.72"
    rx="24.5"
    stroke="url(#lotus-border)"
    stroke-width="1.5"
    width="117"
    x="1.5"
    y="1.5"
  />
</svg>
